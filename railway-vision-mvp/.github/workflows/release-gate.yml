name: release-gate

on:
  workflow_dispatch:

jobs:
  go-no-go:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bootstrap demo environment
        run: |
          bash docker/scripts/bootstrap_demo.sh

      - name: Run GO/NO-GO gate
        run: |
          bash docker/scripts/go_no_go.sh --wait-seconds 180 --report-dir docs/qa/reports

      - name: Upload gate reports
        uses: actions/upload-artifact@v4
        with:
          name: go-no-go-report
          path: docs/qa/reports/*.json
          if-no-files-found: error
