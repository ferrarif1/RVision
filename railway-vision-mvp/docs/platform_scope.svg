<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="2200" height="1260" viewBox="0 0 2200 1260">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#f3f7fc"/>
    </linearGradient>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10z" fill="#2563eb"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10z" fill="#ea580c"/>
    </marker>
    <marker id="arrowTeal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10z" fill="#0f766e"/>
    </marker>
    <style>
      .title { font:700 44px "PingFang SC","Microsoft YaHei",sans-serif; fill:#0b3d91; }
      .sub { font:500 22px "PingFang SC","Microsoft YaHei",sans-serif; fill:#334155; }
      .h2b { font:700 38px "PingFang SC","Microsoft YaHei",sans-serif; fill:#0369a1; }
      .h2p { font:700 38px "PingFang SC","Microsoft YaHei",sans-serif; fill:#1d4ed8; }
      .h2s { font:700 38px "PingFang SC","Microsoft YaHei",sans-serif; fill:#c2410c; }
      .h3 { font:700 30px "PingFang SC","Microsoft YaHei",sans-serif; }
      .p { font:500 24px "PingFang SC","Microsoft YaHei",sans-serif; fill:#1e293b; }
      .step { font:700 18px "PingFang SC","Microsoft YaHei",sans-serif; }
    </style>
  </defs>
  <rect x="0" y="0" width="2200" height="1260" fill="url(#bg)"/>
  <text x="620" y="68" class="title">平台-买家-供应商三方核心流转图</text>
  <text x="620" y="108" class="sub">只保留核心：买家数据输入 + 供应商算法输入 → 平台训练与发布 → 买家授权使用与回流</text>
  <text x="620" y="136" class="sub" style="font-size:18px;fill:#475569;">虚线箭头 = 关键流转路径</text>

  <rect x="40" y="150" width="620" height="940" rx="24" fill="#ecfeff" stroke="#0ea5e9" stroke-width="3"/>
  <rect x="700" y="150" width="920" height="940" rx="24" fill="#eff6ff" stroke="#2563eb" stroke-width="3"/>
  <rect x="1660" y="150" width="520" height="940" rx="24" fill="#fff7ed" stroke="#f97316" stroke-width="3"/>
  <line x1="680" y1="170" x2="680" y2="1070" stroke="#94a3b8" stroke-width="2" stroke-dasharray="8 8"/>
  <line x1="1640" y1="170" x2="1640" y2="1070" stroke="#94a3b8" stroke-width="2" stroke-dasharray="8 8"/>

  <text x="72" y="192" class="h2b">买家</text>
  <text x="732" y="192" class="h2p">平台（我方）</text>
  <text x="1692" y="192" class="h2s">供应商</text>

  <rect x="90" y="250" width="520" height="170" rx="20" fill="#fff" stroke="#0891b2" stroke-width="2.5"/>
  <text x="126" y="300" class="h3" fill="#0c4a6e">买家输入</text>
  <text x="126" y="348" class="p">业务数据 + 标注需求</text>

  <rect x="90" y="470" width="520" height="170" rx="20" fill="#fff" stroke="#0891b2" stroke-width="2.5"/>
  <text x="126" y="520" class="h3" fill="#0c4a6e">买家使用</text>
  <text x="126" y="568" class="p">下载授权模型并部署推理</text>

  <rect x="90" y="690" width="520" height="170" rx="20" fill="#fff" stroke="#0891b2" stroke-width="2.5"/>
  <text x="126" y="740" class="h3" fill="#0c4a6e">买家回流</text>
  <text x="126" y="788" class="p">结果/难例按策略脱敏回传</text>

  <rect x="760" y="260" width="260" height="140" rx="18" fill="#fff" stroke="#3b82f6" stroke-width="2.5"/>
  <text x="804" y="304" class="h3" fill="#1e3a8a" style="font-size:28px;">数据治理</text>
  <text x="804" y="346" class="p" style="font-size:22px;">分级存储</text>

  <rect x="1030" y="260" width="260" height="140" rx="18" fill="#fff" stroke="#3b82f6" stroke-width="2.5"/>
  <text x="1074" y="304" class="h3" fill="#1e3a8a" style="font-size:28px;">训练微调</text>
  <text x="1074" y="346" class="p" style="font-size:22px;">内网执行</text>

  <rect x="1300" y="260" width="260" height="140" rx="18" fill="#fff" stroke="#3b82f6" stroke-width="2.5"/>
  <text x="1344" y="304" class="h3" fill="#1e3a8a" style="font-size:28px;">模型仓库</text>
  <text x="1344" y="346" class="p" style="font-size:22px;">加密 model.enc</text>

  <rect x="760" y="470" width="800" height="170" rx="18" fill="#fff" stroke="#3b82f6" stroke-width="2.5"/>
  <text x="800" y="528" class="h3" fill="#1e3a8a" style="font-size:34px;">签名发布 + 授权计费</text>
  <text x="800" y="576" class="p" style="font-size:24px;">平台私钥签名、发布到授权租户/设备、统一结算</text>

  <rect x="760" y="700" width="800" height="180" rx="18" fill="#ecfdf5" stroke="#10b981" stroke-width="2.5"/>
  <text x="800" y="758" class="h3" fill="#065f46" style="font-size:34px;">平台核心控制权</text>
  <text x="800" y="806" class="p" style="font-size:24px;fill:#14532d;">代码仓库 / 全量数据 / 密钥体系 / 发布权 / 审计权</text>

  <rect x="1710" y="250" width="420" height="210" rx="18" fill="#fff" stroke="#fb923c" stroke-width="2.5"/>
  <text x="1742" y="300" class="h3" fill="#9a3412">供应商输入</text>
  <text x="1742" y="348" class="p">初始算法/模型 + 训练建议</text>

  <rect x="1710" y="500" width="420" height="180" rx="18" fill="#fff" stroke="#fb923c" stroke-width="2.5"/>
  <text x="1742" y="550" class="h3" fill="#9a3412">供应商服务</text>
  <text x="1742" y="598" class="p">平台内协作调优与技术支持</text>

  <rect x="1710" y="730" width="420" height="170" rx="18" fill="#fff5f5" stroke="#ef4444" stroke-width="2.5"/>
  <text x="1742" y="780" class="h3" fill="#991b1b">权限红线</text>
  <text x="1742" y="828" class="p" style="fill:#7f1d1d;">无数据外带、无密钥、无发布权</text>

  <path d="M610 332 L760 332" stroke="#0ea5e9" stroke-width="3.5" stroke-dasharray="10 8" fill="none" marker-end="url(#arrowBlue)"/>
  <text x="620" y="304" class="step" fill="#0369a1">① 数据输入</text>

  <path d="M1710 352 L1290 330" stroke="#ea580c" stroke-width="3.5" stroke-dasharray="10 8" fill="none" marker-end="url(#arrowOrange)"/>
  <text x="1580" y="324" class="step" fill="#c2410c">② 算法输入</text>

  <path d="M1020 330 L1030 330" stroke="#2563eb" stroke-width="3.5" stroke-dasharray="10 8" fill="none" marker-end="url(#arrowBlue)"/>
  <text x="1040" y="242" class="step" fill="#1e3a8a">③ 训练</text>

  <path d="M1290 330 L1300 330" stroke="#2563eb" stroke-width="3.5" stroke-dasharray="10 8" fill="none" marker-end="url(#arrowBlue)"/>
  <text x="1310" y="242" class="step" fill="#1e3a8a">④ 入库</text>

  <path d="M1430 400 L1290 470" stroke="#1d4ed8" stroke-width="3.5" stroke-dasharray="10 8" fill="none" marker-end="url(#arrowBlue)"/>
  <text x="1470" y="432" class="step" fill="#1e3a8a">⑤ 发布前签名</text>

  <path d="M760 548 L610 560" stroke="#0f766e" stroke-width="3.5" stroke-dasharray="10 8" fill="none" marker-end="url(#arrowTeal)"/>
  <text x="620" y="526" class="step" fill="#115e59">⑥ 授权使用</text>

  <path d="M610 776 L760 346" stroke="#0284c7" stroke-width="3.5" stroke-dasharray="10 8" fill="none" marker-end="url(#arrowBlue)"/>
  <text x="632" y="738" class="step" fill="#0c4a6e">⑦ 结果回流</text>

  <rect x="40" y="1120" width="2140" height="120" rx="16" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
  <text x="70" y="1188" class="p" style="font-size:22px;fill:#334155;">核心原则：平台掌控数据与模型成果；供应商提供算法能力；买家按授权使用并回流结果</text>
</svg>
